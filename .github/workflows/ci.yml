name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (black + isort)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install black isort
          python -m pip install -r requirements.txt

      - name: Run black (check)
        run: python -m black --check .

      - name: Run isort (check)
        run: python -m isort --check-only .

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the build for type issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install mypy
          python -m pip install -r requirements.txt
          # Install type stubs for better checking
          python -m pip install types-Flask-Cors types-requests types-python-dateutil || true

      - name: Run mypy
        run: |
          python -m mypy . 
        continue-on-error: true

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: .mypy_cache/
          retention-days: 7

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint]  # Optional: run tests after linting passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov pytest-xdist
          python -m pip install -r requirements.txt

      - name: Run pytest with coverage
        run: |
          python -m pytest -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  dependency-scan:
    name: Dependency scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit safety

      - name: Scan with pip-audit
        run: python -m pip_audit -r requirements.txt || true

      - name: Scan with safety
        run: safety check -r requirements.txt --full-report || true

  security-scan:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit

      - name: Run bandit
        run: |
          python -m bandit -r . -f json -o bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  # Optional: Add a status check job
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, dependency-scan, security-scan]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Dependency Scan: ${{ needs.dependency-scan.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          
          # Fail only if critical jobs fail
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ]; then
            echo "Critical jobs failed!"
            exit 1
          fi
          echo "All checks passed!"