name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (for manual runs)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  quality-gate:
    name: Quality gate (lint + type + test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run black (check)
        run: python -m black --check .

      - name: Run isort (check)
        run: python -m isort --check-only .

      - name: Run mypy
        run: python -m mypy .

      - name: Run pytest
        run: python -m pytest

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            echo "value=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build source archive
        shell: bash
        run: |
          ARCHIVE_NAME="investment-strategist-${{ steps.tag.outputs.value }}.tar.gz"
          tar -czf "$ARCHIVE_NAME" \
            --exclude='.git' \
            --exclude='investment_strategist' \
            --exclude='.venv' \
            --exclude='venv' \
            .
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: source-archive-${{ steps.tag.outputs.value }}
          path: ${{ env.ARCHIVE_NAME }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Release ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: ${{ env.ARCHIVE_NAME }}
